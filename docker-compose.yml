version: '3.9'

services:
  # Base de datos PostgreSQL
  postgres:
    image: postgres:16-alpine
    container_name: flync_db
    restart: always
    environment:
      POSTGRES_DB: flync_db
      POSTGRES_USER: flync_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-flync_secure_2024}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations/001_schema.sql:/docker-entrypoint-initdb.d/001_schema.sql
      - ./backend/migrations/002_seed.sql:/docker-entrypoint-initdb.d/002_seed.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flync_user -d flync_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis para sesiones y caché
  redis:
    image: redis:7-alpine
    container_name: flync_redis
    restart: always
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"

  # Backend API Node.js
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: flync_api
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: flync_db
      DB_USER: flync_user
      DB_PASSWORD: ${DB_PASSWORD:-flync_secure_2024}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-flync_jwt_super_secret_cambia_esto_en_produccion}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-flync_refresh_secret}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      IMC2_API_KEY: ${IMC2_API_KEY}
      IMC2_BASE_URL: ${IMC2_BASE_URL:-https://api.imc2simplifica.com}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM:-FLY NC <noreply@flync.es>}
    ports:
      - "3001:3001"
    volumes:
      - uploads_data:/app/uploads

  # Frontend React
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL:-http://localhost:3001}
    container_name: flync_web
    restart: always
    depends_on:
      - backend
    ports:
      - "3000:80"

  # Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: flync_nginx
    restart: always
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/ssl:/etc/nginx/ssl:ro
      - certbot_data:/var/www/certbot

volumes:
  postgres_data:
  redis_data:
  uploads_data:
  certbot_data:
